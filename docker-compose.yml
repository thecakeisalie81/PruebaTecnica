version: "3"

services:
  app:
    build: ./PruebaTecnica
    platform: linux/amd64
    mem_limit: 512m
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://db:5432/PruebaTecnicaSupermercado
      DB_USER_NAME: postgres
      DB_PASSWORD: 1234
    restart: always
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15.14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: PruebaTecnicaSupermercado
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5